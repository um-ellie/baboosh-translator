<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      width: 220px;
      background-color: #ffffff;
      color: #1e293b;
    }
    .popup-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid #f1f5f9;
      background-color: #f8fafc;
    }
    .popup-header img {
      width: 20px;
      height: 20px;
    }
    .popup-header h3 {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
    }
    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      text-decoration: none;
      color: #334155;
      font-size: 13px;
      cursor: pointer;
      transition: background-color 0.15s ease;
    }
    .menu-item:hover {
      background-color: #f1f5f9;
      color: #4f46e5;
    }
    .menu-link {
      justify-content: flex-start;
      gap: 10px;
    }
    .divider {
      height: 1px;
      background-color: #f1f5f9;
      margin: 4px 0;
    }
    /* Simple CSS Toggle Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 32px;
      height: 18px;
    }
    .switch input { 
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #cbd5e1;
      transition: .2s;
      border-radius: 18px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: .2s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #4f46e5;
    }
    input:checked + .slider:before {
      transform: translateX(14px);
    }
  </style>
</head>
<body>

  <div class="popup-header">
    <img src="../assets/icon48.png" alt="Baboosh Icon">
    <h3>Baboosh Translate</h3>
  </div>

  <!-- A quick value-add feature: Instant feature toggling without diving into options -->
  <div class="menu-item">
    <span>🔊 Instant Audio</span>
    <label class="switch">
      <input type="checkbox" id="instantAudioToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="divider"></div>

  <!-- Standard navigation links requested -->
  <a href="#" id="openOptions" class="menu-item menu-link">⚙️ Extension Settings</a>
  <a href="#" id="openAbout" class="menu-item menu-link">ℹ️ About Baboosh</a>

  <script src="popup.js"></script>
</body>
</html>
